name: Daily metadata collect

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r collector/requirements.txt pytest

      - name: Run pytest (fail-fast — don't push broken DB)
        run: |
          pytest -q

      - name: Run collector
        env:
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
        run: |
          python -m collector.main --with-s2

      - name: Sweep daily digests older than 60 days
        run: |
          find metadb/daily -type f -name "*.md" -mtime +60 -print -delete || true

      - name: Sweep stats history older than 90 days
        run: |
          python - <<'PY'
          from datetime import datetime, timedelta, timezone
          from pathlib import Path
          import json
          src = Path("metadb/stats_history.jsonl")
          if not src.exists():
              raise SystemExit(0)
          cutoff = datetime.now(timezone.utc) - timedelta(days=90)
          kept = []
          for line in src.read_text().splitlines():
              line = line.strip()
              if not line:
                  continue
              try:
                  row = json.loads(line)
                  ran_at = row.get("ran_at")
                  if ran_at and datetime.fromisoformat(ran_at) >= cutoff:
                      kept.append(line)
              except Exception:
                  kept.append(line)  # keep unparseable rows
          src.write_text("\n".join(kept) + ("\n" if kept else ""))
          print(f"stats_history rows kept: {len(kept)}")
          PY

      - name: Commit DB changes
        run: |
          git config user.name "paper-suggestion-bot"
          git config user.email "noreply@github.com"
          git add metadb/
          if git diff --staged --quiet; then
            echo "No DB changes."
          else
            git commit -m "data: rolling DB update $(date -u +%F)"
            git push
          fi
