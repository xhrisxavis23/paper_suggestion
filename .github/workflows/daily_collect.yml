name: Daily metadata collect

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r collector/requirements.txt

      - name: Run collector
        env:
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
        run: |
          python -m collector.main

      - name: Commit DB changes
        run: |
          git config user.name "paper-suggestion-bot"
          git config user.email "noreply@github.com"
          # metadb/ is in .gitignore so devs do not commit local runs;
          # CI force-adds to accumulate history on the remote.
          git add -f metadb/
          if git diff --staged --quiet; then
            echo "No DB changes."
          else
            git commit -m "data: rolling DB update $(date -u +%F)"
            git push
          fi
